    <link rel="preconnect" href="https://fonts.googleapis.com">

          </p>
        </section>

        <footer class="links">

          <a href="https://twitter.com/seanmateer" target="_blank" rel="noopener">Twitter</a>
          <a href="https://linkedin.com/in/seanmateer" target="_blank" rel="noopener">LinkedIn</a>
        </footer>
      </div>

      <!-- Image reveal container -->
      <div class="image-reveal" id="image-reveal">
        <canvas id="image-canvas"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
